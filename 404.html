<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Страница не найдена · Colver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    :root {
      --primary: #1D4ED8;
      --muted-foreground: #71717A;
      --foreground: #18181B;
      --border: #E4E4E7;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--foreground);
      background: #FAFAFA;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { text-align: center; max-width: 520px; padding: 48px 24px; }
    .code {
      font-size: 140px; font-weight: 800; line-height: 1;
      letter-spacing: -6px; margin: 0 0 12px;
      background: linear-gradient(135deg, #1D4ED8, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 { font-size: 24px; font-weight: 700; margin: 0 0 12px; }
    p  { font-size: 14px; color: var(--muted-foreground); line-height: 1.55; margin: 0 0 28px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 8px;
      background: var(--primary); color: #fff;
      text-decoration: none; font-weight: 600; font-size: 14px;
      transition: background .12s, box-shadow .12s, transform .05s;
    }
    .btn:hover  { background: #1E40AF; box-shadow: 0 4px 14px rgba(29,78,216,.28); }
    .btn:active { transform: translateY(1px); }
    .btn svg { width: 14px; height: 14px; }
    .hint {
      margin-top: 18px;
      font-size: 12px; color: var(--muted-foreground);
    }
    .hint code {
      background: #fff; border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 4px; font-size: 11.5px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>
      Возможно, ссылка устарела или раздел был перемещён.
      Проверьте адрес или вернитесь на главную.
    </p>
    <a class="btn" href="/colver-rop-prototype/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      На главную
    </a>
    <div class="hint">
      <span>Colver — Контроль качества (РОП)</span>
    </div>
  </div>
</body>
</html>
