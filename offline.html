<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Нет интернета · Colver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    :root {
      --primary: #1D4ED8;
      --muted-foreground: #71717A;
      --foreground: #18181B;
      --border: #E4E4E7;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--foreground);
      background: #FAFAFA;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { text-align: center; max-width: 480px; padding: 48px 24px; }
    .icon { display: flex; justify-content: center; margin-bottom: 16px; color: #71717A; }
    h1 { font-size: 24px; font-weight: 700; margin: 0 0 8px; }
    p  { font-size: 14px; color: var(--muted-foreground); line-height: 1.55; margin: 0 0 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 8px;
      background: var(--primary); color: #fff;
      border: 0; cursor: pointer;
      font-family: inherit; font-weight: 600; font-size: 14px;
      transition: background .12s, box-shadow .12s, transform .05s;
    }
    .btn:hover  { background: #1E40AF; box-shadow: 0 4px 14px rgba(29,78,216,.28); }
    .btn:active { transform: translateY(1px); }
    .btn svg { width: 14px; height: 14px; }
    .hint { margin-top: 14px; font-size: 11.5px; color: var(--muted-foreground); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning svg { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Нет подключения к интернету</h1>
    <p>
      Проверьте Wi-Fi или мобильную сеть и попробуйте обновить страницу.
      Часть последних данных может быть устаревшей.
    </p>
    <button id="retry" class="btn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      <span>Повторить</span>
    </button>
    <div class="hint">Если связь восстановится автоматически — окно закроется само.</div>
  </div>
  <script>
    // Простейшая логика: кнопка перезагружает страницу.
    // navigator.onLine также «слушаем» — если стало true, сразу редирект.
    var btn = document.getElementById('retry');
    btn.addEventListener('click', function () {
      btn.classList.add('spinning');
      setTimeout(function () { location.reload(); }, 400);
    });
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
